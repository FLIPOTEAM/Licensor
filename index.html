function getCategoryData(tier) {
  const prod = getProductData(tier);
  const cats = {};
  prod.forEach(p => { cats[p.category] = (cats[p.category]||0) + p.pct; });

    .map(([cat,pct]) => ({cat, pct: Math.round(pct*10)/10}))
    .sort((a,b) => b.pct - a.pct);
}

function Avatar({id, size=44}) {
  const cfg = CHAR_AVATAR[id] || {emoji:"?",label:""};
  return (
    <div style={{width:size,height:size,borderRadius:"50%",background:CHAR_COLORS[id]||"#555",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.42,flexShrink:0,border:"2px solid white",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>{cfg.emoji}</div>
  );
}
function SectionHeader({number, title}) {
  return (
    <div style={{background:"linear-gradient(90deg,#6c63ff,#818cf8)",borderRadius:8,padding:"10px 20px",display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
      <span style={{color:"white",fontWeight:700,fontSize:16}}>{number}.</span>
      <span style={{color:"white",fontWeight:700,fontSize:16,fontFamily:"Georgia,serif"}}>{title}</span>
      <div style={{marginLeft:"auto",display:"flex",gap:3}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"rgba(255,255,255,0.6)"}}/>)}</div>
    </div>
  );
}
function MetricBadge({label, color}) {
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:12,background:`${color}18`,border:`1px solid ${color}44`,fontSize:11,color:color,fontWeight:600}}>
      <span style={{width:6,height:6,borderRadius:"50%",background:color}}/>
      {label}
    </span>
  );
}
const PieTooltip = ({active,payload}) => {
  if (active && payload?.length) return (
    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",boxShadow:"0 4px 12px rgba(0,0,0,0.1)"}}>
      <p style={{margin:0,fontWeight:600,fontSize:12,color:"#111827"}}>{payload[0].name}</p>
      <p style={{margin:0,fontSize:12,color:"#6c63ff"}}>{rPct(payload[0].value)}%</p>
    </div>
  );
  return null;
};
function SubTab({label, active, onClick}) {
  return (
    <button onClick={onClick} style={{padding:"6px 16px",borderRadius:20,cursor:"pointer",background:active?"#6c63ff":"transparent",color:active?"white":"#6b7280",fontSize:12,fontWeight:600,border:`1px solid ${active?"#6c63ff":"#e5e7eb"}`,transition:"all 0.15s"}}>{label}</button>
  );
}
function CharSegmentChart({data, title, subtitle}) {
  return (
    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:2}}>{title}</div>
      {subtitle && <div style={{fontSize:11,color:"#9ca3af",marginBottom:10}}>{subtitle}</div>}
      <ResponsiveContainer width="100%" height={140}>
        <PieChart><Pie data={data} dataKey="pct" nameKey="name" cx="50%" cy="50%" outerRadius={58} innerRadius={26} paddingAngle={2}>
          {data.map((e,i)=><Cell key={i} fill={e.id==="other"?"#f3f4f6":(CHAR_COLORS[e.id]||"#94a3b8")} stroke={e.id==="other"?"#d1d5db":"white"} strokeWidth={2}/>)}
        </Pie><Tooltip content={<PieTooltip/>}/></PieChart>
      </ResponsiveContainer>
      <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:8}}>
        {data.map((d,i)=>{const color=d.id==="other"?"#9ca3af":(CHAR_COLORS[d.id]||"#94a3b8");return(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:d.id==="other"?"#f3f4f6":(CHAR_COLORS[d.id]||"#94a3b8"),flexShrink:0}}/>
            <span style={{fontSize:10,color:d.id==="other"?"#9ca3af":"#374151",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
            <span style={{fontSize:10,fontWeight:600,color,flexShrink:0}}>{rPct(d.pct)}%</span>
          </div>
        );})}
      </div>
    </div>
  );
}
function GenreSegmentChart({data, title}) {
  if (!data || data.length === 0) return (
    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:8}}>{title}</div>
      <div style={{fontSize:11,color:"#9ca3af",textAlign:"center",padding:"20px 0"}}>No data for this tier</div>
    </div>
  );
  const pieData = data.map(d=>({name:d.g,value:d.pct,color:d.g==="Other"?"#f3f4f6":(GENRE_COLORS[d.g]||"#94a3b8")}));
  return (
    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:2}}>{title}</div>
      <ResponsiveContainer width="100%" height={140}>
        <PieChart><Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={58} innerRadius={26} paddingAngle={2}>
          {pieData.map((e,i)=><Cell key={i} fill={e.color} stroke={e.name==="Other"?"#d1d5db":"white"} strokeWidth={2}/>)}
        </Pie><Tooltip content={<PieTooltip/>}/></PieChart>
      </ResponsiveContainer>
      <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:8}}>
        {pieData.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:d.name==="Other"?"#f3f4f6":(d.color||"#94a3b8"),flexShrink:0}}/>
            <span style={{fontSize:10,color:d.name==="Other"?"#9ca3af":"#374151",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
            <span style={{fontSize:10,fontWeight:600,color:d.name==="Other"?"#9ca3af":d.color,flexShrink:0}}>{rPct(d.value)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}
function RankCard({rank, id, name, subtitle, pct}) {
  const isFirst=rank===1;
  const label=rank===1?"1st":rank===2?"2nd":"3rd";
  return (
    <div style={{background:isFirst?"#f5f3ff":"white",border:`1px solid ${isFirst?"#6c63ff":"#e5e7eb"}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:13,color:isFirst?"#6c63ff":"#9ca3af",width:28,flexShrink:0}}>{label}</div>
      <div style={{width:14,height:14,borderRadius:"50%",background:CHAR_COLORS[id]||"#94a3b8",flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:600,color:"#111827",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{name}</div>
        {subtitle && <div style={{fontSize:10,color:"#9ca3af"}}>{subtitle}</div>}
      </div>
      <div style={{fontSize:16,fontWeight:700,color:isFirst?"#6c63ff":"#374151"}}>{pct}<span style={{fontSize:10,color:"#9ca3af"}}>%</span></div>
    </div>
  );
}
function GenreRankCard({rank, genre, pct}) {
  const isFirst=rank===1;
  const label=rank===1?"1st":rank===2?"2nd":"3rd";
  const color=GENRE_COLORS[genre]||"#6c63ff";
  return (
    <div style={{background:isFirst?`${color}10`:"white",border:`1px solid ${isFirst?color+"44":"#e5e7eb"}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:13,color:isFirst?color:"#9ca3af",width:28,flexShrink:0}}>{label}</div>
      <div style={{width:14,height:14,borderRadius:"50%",background:color,flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:600,color:"#111827"}}>{genre}</div>
        <div style={{fontSize:10,color:"#6b7280"}}>{GENRE_CHARS[genre]?.join(" · ")}</div>
      </div>
      <div style={{fontSize:16,fontWeight:700,color:isFirst?color:"#374151"}}>{pct}<span style={{fontSize:10,color:"#9ca3af"}}>%</span></div>
    </div>
  );
}

// ─── HELPER: horizontal bar list ─────────────────────────────────────────────
function BarList({items, colorFn, labelFn, iconFn, top1pct}) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:11}}>
      {items.map((d,i)=>{
        const color = colorFn(d,i);
        return (
          <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#9ca3af",width:20,textAlign:"right",flexShrink:0}}>{i+1}</span>
            {iconFn && iconFn(d,i)}
            <span style={{fontSize:12,color:"#374151",width:iconFn?160:188,flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:i<3?700:400}}>{labelFn(d)}</span>
            <div style={{flex:1,background:"#f3f4f6",borderRadius:4,height:14,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:4,width:`${top1pct>0?(d.pct/top1pct)*100:0}%`,background:color}}/>
            </div>
            <span style={{fontSize:11,fontWeight:600,color,width:42,textAlign:"right",flexShrink:0}}>{rPct(d.pct)}%</span>
          </div>
        );
      })}
    </div>
  );
}

const CHAR_NAMES_LIST = Object.keys(CHAR_WIN_MATRIX);
// Overall win rate per character (W / (W+L))
const CHAR_WIN_RATE = {};
CHAR_NAMES_LIST.forEach(c => {
  const tw = Object.values(CHAR_WIN_MATRIX[c]).reduce((s,v)=>s+v,0);
  const tl = CHAR_NAMES_LIST.filter(o=>o!==c).reduce((s,o)=>(s+(CHAR_WIN_MATRIX[o]?.[c]||0)),0);
  CHAR_WIN_RATE[c] = tw+tl>0 ? Math.round(tw/(tw+tl)*100) : 0;
});

function CharH2H() {
  const [selected, setSelected] = useState("Pikachu");
  const wins = CHAR_WIN_MATRIX[selected]||{};
  const others = CHAR_NAMES_LIST.filter(c=>c!==selected);

  // BT scores for pairwise probability: P(A beats B) = scoreA / (scoreA + scoreB)
  const getBTScore = name => {
    const entry = TIER_DATA.top100.char_overall.find(c=>c.name===name);
    return entry ? entry.pct : 1;
  };

  const h2h = others.map(opp=>{
    const w=wins[opp]||0, l=(CHAR_WIN_MATRIX[opp]?.[selected])||0;
    const sA=getBTScore(selected), sB=getBTScore(opp);
    const btProb = Math.round(sA/(sA+sB)*100);
    return {opp,w,l,rate:btProb};
  }).sort((a,b)=>b.rate-a.rate);

  const selId = CHAR_NAME_TO_ID[selected]||"char_5";
  const selColor = CHAR_COLORS[selId]||"#6c63ff";
  const btRank = CHAR_OVERALL.findIndex(c=>c.name===selected)+1;

  return (
    <div>
      {/* Character selector grid */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
        {CHAR_NAMES_LIST.map(name=>{
          const cid = CHAR_NAME_TO_ID[name]||"char_0";
          const active = selected===name;
          const color = CHAR_COLORS[cid]||"#94a3b8";
          return (
            <button key={name} onClick={()=>setSelected(name)} style={{
              display:"inline-flex",alignItems:"center",gap:6,
              padding:"6px 12px",borderRadius:20,cursor:"pointer",
              background: active?color:"transparent",
              border:`1.5px solid ${active?color:"#e5e7eb"}`,
              color: active?"white":"#6b7280",
              fontSize:11,fontWeight:600,transition:"all 0.15s",
            }}>
              {name}
            </button>
          );
        })}
      </div>

      {/* H2H grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {h2h.map(({opp,w,l,rate})=>{
          const oppId = CHAR_NAME_TO_ID[opp]||"char_0";
          const oppColor = CHAR_COLORS[oppId]||"#94a3b8";
          const win = rate>=50;
          return (
            <div key={opp} style={{background:"white",border:`1px solid ${win?selColor+"44":"#e5e7eb"}`,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:oppColor,flexShrink:0}}/>
                <div style={{fontSize:10,color:"#6b7280",fontWeight:600,lineHeight:1.3}}>{opp}</div>
              </div>
              <div style={{fontSize:28,fontWeight:800,color:win?selColor:"#ef4444",lineHeight:1,marginBottom:2}}>
                {rate}<span style={{fontSize:12}}>%</span>
              </div>
              <div style={{fontSize:9,color:"#9ca3af",marginBottom:8}}>BT Win Probability</div>
              <div style={{height:4,background:"#f3f4f6",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${rate}%`,background:win?selColor:"#ef4444",borderRadius:2}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ProdSegmentChart({data, title, view}) {
  const isLicensor = view === "licensor";
  if (!data || data.length === 0) return (
    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:8}}>{title}</div>
      <div style={{fontSize:11,color:"#9ca3af",textAlign:"center",padding:"20px 0"}}>No data for this tier</div>
    </div>
  );
  const displayData = isLicensor
    ? data.map(d=>{
        if(d.id==="other") return d;
        const meta = PROD_META.find(m=>m.id===d.id);
        return {...d, name: meta ? meta.category : d.name};
      })
    : data;
  const pieData = displayData.map(d=>({name:d.name, value:d.pct, color:d.id==="other"?"#f3f4f6":(CHAR_COLORS[d.id]||"#94a3b8")}));
  return (
    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:2}}>{title}</div>
      <ResponsiveContainer width="100%" height={140}>
        <PieChart><Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={58} innerRadius={26} paddingAngle={2}>
          {pieData.map((e,i)=><Cell key={i} fill={e.color} stroke={e.name==="Other"?"#d1d5db":"white"} strokeWidth={2}/>)}
        </Pie><Tooltip content={<PieTooltip/>}/></PieChart>
      </ResponsiveContainer>
      <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:8}}>
        {displayData.map((d,i)=>{
          const color = d.id==="other"?"#9ca3af":(CHAR_COLORS[d.id]||"#94a3b8");
          const fn = !isLicensor && PRODUCT_SVG[d.name];
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
              {d.id!=="other"
                ? (isLicensor
                  ? <div style={{width:14,height:14,borderRadius:"50%",background:CAT_COLORS[d.name]||color,flexShrink:0}}/>
                  : <div style={{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}/>)
                : <div style={{width:18,height:18,borderRadius:"50%",background:"#f3f4f6",border:"1px solid #d1d5db",flexShrink:0}}/>
              }
              <span style={{fontSize:10,color:d.id==="other"?"#9ca3af":"#374151",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
              <span style={{fontSize:10,fontWeight:600,color,flexShrink:0}}>{rPct(d.pct)}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ConsumersOverall({filter="overall"}) {
  // Group consumers by segment
  const LOCS = ['Singapore','Indonesia','Thailand','Malaysia','Philippines'];
  const AGE_GROUPS = ['Under 25','25–34','35–44','45+'];
  const GENDERS = ['Female','Male'];

  const ageGroup = age => age<25?'Under 25':age<=34?'25–34':age<=44?'35–44':'45+';

  const avgOf = (people, key) => {
    if (!people.length) return null;
    return people.reduce((s,c)=>s+c[key],0)/people.length;
  };

  const fmtScore = n => n===null ? "—" : Math.round(((n+1)/2)*100)+"%";
  // Sub-dimensions (Font, Color, Sizing, Alignment) are on 0–1 scale, not -1..+1
  const fmtSub   = n => n===null ? "—" : Math.round(n*100)+"%";
  const subColor = n => n===null?"#9ca3af":n<0.25?"#ef4444":n<0.5?"#f59e0b":"#22c55e";
  const scoreColor = n => { if(n===null) return "#9ca3af"; const p=(n+1)/2; return p<0.25?"#ef4444":p<0.5?"#f59e0b":"#22c55e"; };
  const scoreBg    = n => { if(n===null) return "#f9fafb"; const p=(n+1)/2; return p<0.25?"#fef2f2":p<0.5?"#fffbeb":"#f0fdf4"; };
  const scoreLabel = n => { if(n===null) return "N/A"; const p=(n+1)/2; return p<0.25?"Low":p<0.5?"Mid":"High"; };

  const LOGO_SUBS = [
    {key:"logoFont",  label:"Font",      emoji:"🔤", color:"#8b5cf6"},
    {key:"logoColor", label:"Color",     emoji:"🎨", color:"#ec4899"},
    {key:"logoSizing",label:"Sizing",    emoji:"📐", color:"#f59e0b"},
    {key:"logoAlign", label:"Alignment", emoji:"⚖️", color:"#f97316"},
  ];

  const MATRIX_KEYS = [
    {key:"logoAware",   label:"Logo Awareness",         color:"#6c63ff", emoji:"🔖", desc:"How well participants recognise the brand logo", hasSubs:true},
    {key:"charAware",   label:"Character Awareness",    color:"#22c55e", emoji:"👤", desc:"Familiarity with the IP characters"},
    {key:"accessAware", label:"Accessories Awareness",  color:"#0ea5e9", emoji:"👜", desc:"Recognition of branded accessories"},
    {key:"envAware",    label:"Environmental Awareness",color:"#14b8a6", emoji:"🌿", desc:"Awareness of brand in physical environments"},
  ];

  const MetricCard = ({m, people, compact=false}) => {
    const val = avgOf(people, m.key);
    const pct = val===null?0:Math.min(Math.max((val+1)/2*100,0),100);
    const color = scoreColor(val);
    const bg = scoreBg(val);
    if (compact) return (
      <div style={{background:"white",border:`1px solid ${m.color}22`,borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
          <div style={{fontSize:11,color:"#374151",fontWeight:600,flex:1,lineHeight:1.2}}>{m.label}</div>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:6}}>
          <div style={{fontSize:22,fontWeight:800,color,lineHeight:1}}>{fmtScore(val)}</div>
          {val!==null && <div style={{fontSize:9,padding:"1px 6px",borderRadius:6,background:bg,color,fontWeight:700}}>{scoreLabel(val)}</div>}
        </div>
        <div style={{height:5,background:"#f3f4f6",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.round(pct)}%`,background:m.color,borderRadius:3}}/>
        </div>
        {m.hasSubs && val!==null && (
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:5}}>
            {LOGO_SUBS.map(s=>{
              const sv=avgOf(people,s.key);const spct=sv===null?0:Math.min(Math.max(sv*100,0),100);
              return (
                <div key={s.key} style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:10,flexShrink:0}}>{s.emoji}</span>
                  <span style={{fontSize:9,color:"#6b7280",width:52,flexShrink:0}}>{s.label}</span>
                  <div style={{flex:1,height:4,background:"#f3f4f6",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${spct}%`,background:s.color,borderRadius:2}}/>
                  </div>
                  <span style={{fontSize:9,fontWeight:700,color:subColor(sv),width:38,textAlign:"right",flexShrink:0}}>{fmtSub(sv)}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
    // Full card
    return (
      <div style={{background:"white",border:`1px solid ${m.color}33`,borderRadius:14,padding:"24px",boxShadow:"0 1px 6px rgba(0,0,0,0.06)",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,width:80,height:80,borderRadius:"0 14px 0 80px",background:m.color+"0c"}}/>
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:16}}>
          <div><div style={{fontSize:14,fontWeight:700,color:"#111827",marginBottom:3}}>{m.label}</div><div style={{fontSize:11,color:"#9ca3af"}}>{m.desc}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:12}}>
          <div style={{fontSize:40,fontWeight:800,color,lineHeight:1}}>{fmtScore(val)}</div>
          <div>
            <div style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:bg,color,fontWeight:700,display:"inline-block"}}>{scoreLabel(val)}</div>
            <div style={{fontSize:10,color:"#9ca3af",marginTop:3}}>scale 0% to 100%</div>
          </div>
        </div>
        <div style={{height:8,background:"#f3f4f6",borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.round(pct)}%`,background:`linear-gradient(90deg,${m.color}88,${m.color})`,borderRadius:4}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4,marginBottom:m.hasSubs?16:0}}>
          <span style={{fontSize:9,color:"#d1d5db"}}>0%</span><span style={{fontSize:9,color:"#d1d5db"}}>50%</span><span style={{fontSize:9,color:"#d1d5db"}}>100%</span>
        </div>
        {m.hasSubs && (
          <div style={{borderTop:"1px solid #f3f4f6",paddingTop:14}}>
            <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Breakdown</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {LOGO_SUBS.map(s=>{
                const sv=avgOf(people,s.key);const spct=sv===null?0:Math.min(Math.max(sv*100,0),100);
                return (
                  <div key={s.key} style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:13,flexShrink:0}}>{s.emoji}</span>
                    <span style={{fontSize:11,color:"#374151",fontWeight:600,width:70,flexShrink:0}}>{s.label}</span>
                    <div style={{flex:1,height:7,background:"#f3f4f6",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${spct}%`,background:s.color,borderRadius:4}}/></div>
                    <span style={{fontSize:11,fontWeight:700,color:subColor(sv),width:44,textAlign:"right",flexShrink:0}}>{fmtSub(sv)}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  };

  const SegmentBlock = ({label, people}) => {
    if (!people.length) return (
      <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"20px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:12}}>{label}</div>
        <div style={{fontSize:11,color:"#9ca3af",textAlign:"center",padding:"20px 0"}}>No data</div>
      </div>
    );
    return (
      <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"20px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}}>{label}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {MATRIX_KEYS.map(m=><MetricCard key={m.key} m={m} people={people} compact/>)}
        </div>
      </div>
    );
  };

  if (filter === "overall") {
    return (
      <div style={{marginBottom:40}}>
        <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:14}}>Key Awareness Metrics</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:28}}>
          {MATRIX_KEYS.map(m=><MetricCard key={m.key} m={m} people={CONSUMERS}/>)}
        </div>
      </div>
    );
  }

  if (filter === "location") {
    return (
      <div style={{marginBottom:40}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:8}}>
          {LOCS.map(loc=><SegmentBlock key={loc} label={`${FLAGS[loc]} ${loc}`} people={CONSUMERS.filter(c=>c.loc===loc)}/>)}
        </div>
      </div>
    );
  }

  if (filter === "age") {
    return (
      <div style={{marginBottom:40}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
          {AGE_GROUPS.map(ag=><SegmentBlock key={ag} label={ag} people={CONSUMERS.filter(c=>ageGroup(c.age)===ag)}/>)}
        </div>

      </div>
    );
  }

  if (filter === "gender") {
    return (
      <div style={{marginBottom:40}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          {GENDERS.map(g=><SegmentBlock key={g} label={`${g==="Female"?"♀":"♂"} ${g}`} people={CONSUMERS.filter(c=>c.gender===g)}/>)}
        </div>
      </div>
    );
  }

  return null;
}

const ALL_LOCS  = ['Singapore','Indonesia','Thailand','Malaysia','Philippines'];
const ALL_AGE_GROUPS = ['Under 25','25–34','35–44','45+'];

function LocAgeGrid({dataKey, view}) {
  const [selected, setSelected] = useState(null);
  const isLicensor = view === "licensor";

  const cells = LOC_AGE_CELLS;

  const MiniBar = ({items, colorFn, labelFn, iconFn}) => (
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {items.slice(0,3).map((d,i)=>{
        const color = colorFn(d);
        return (
          <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
            {iconFn(d)}
            <span style={{fontSize:9.5,color:"#374151",width:80,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:i===0?700:400}}>{labelFn(d)}</span>
            <div style={{flex:1,background:"#f3f4f6",borderRadius:3,height:8,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${items[0].pct>0?(d.pct/items[0].pct)*100:0}%`,background:color,borderRadius:3}}/>
            </div>
            <span style={{fontSize:9.5,fontWeight:700,color,width:32,textAlign:"right",flexShrink:0}}>{rPct(d.pct)}%</span>
          </div>
        );
      })}
    </div>
  );

  const renderCell = (cell) => {
    const rawData = dataKey==="ip" ? cell.ip : dataKey==="genre" ? cell.genre : cell.prod;
    // Map product names to categories for licensor
    const data = (dataKey==="prod" && isLicensor)
      ? rawData.map(d=>{
          if(d.id==="other") return d;
          const meta = PROD_META.find(m=>m.id===d.id);
          return {...d, name: meta ? meta.category : d.name};
        })
      : rawData;
    if (dataKey==="genre") {
      return <MiniBar items={data}
        colorFn={d=>d.g==="Other"?"#9ca3af":(GENRE_COLORS[d.g]||"#94a3b8")}
        labelFn={d=>d.g}
        iconFn={d=><div style={{width:10,height:10,borderRadius:"50%",background:d.g==="Other"?"#f3f4f6":(GENRE_COLORS[d.g]||"#94a3b8"),flexShrink:0}}/>}
      />;
    }
    const colorFn = d=>d.id==="other"?"#9ca3af":(CHAR_COLORS[d.id]||"#94a3b8");
    const iconFn = d=><div style={{width:10,height:10,borderRadius:"50%",background:d.id==="other"?"#f3f4f6":(CHAR_COLORS[d.id]||"#94a3b8"),flexShrink:0}}/>;
    return <MiniBar items={data} colorFn={colorFn} labelFn={d=>d.name} iconFn={iconFn}/>;
  };

  return (
    <div style={{marginBottom:40}}>
      {/* Grid table */}
      <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        {/* Header row */}
        <div style={{display:"grid",gridTemplateColumns:"120px repeat(4,1fr)",background:"#f8f9fb",borderBottom:"1px solid #e5e7eb"}}>

              {ag}
            </div>
          ))}
        </div>
        {/* Data rows */}
        {ALL_LOCS.map((loc,li)=>(
          <div key={loc} style={{display:"grid",gridTemplateColumns:"120px repeat(4,1fr)",borderBottom:li<ALL_LOCS.length-1?"1px solid #e5e7eb":"none"}}>

              <span style={{fontSize:16}}>{FLAGS[loc]}</span>
              <span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{loc}</span>
            </div>
            {/* Age group cells */}
            {ALL_AGE_GROUPS.map(ag=>{
              const key = `${loc}|${ag}`;
              const cell = LOC_AGE_MAP[key];
              const isSelected = selected===key;
              return (
                <div key={ag} onClick={()=>setSelected(isSelected?null:key)}
                  style={{
                    padding:"12px 10px",
                    borderRight:"1px solid #e5e7eb",
                    background: cell ? (isSelected?"#f5f3ff":"white") : "#f9fafb",
                    cursor: cell?"pointer":"default",

                  {cell ? (

                    <div style={{height:60,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:10,color:"#d1d5db"}}>—</span>
                    </div>
                  )}

              );
            })}
          </div>
        ))}
      </div>

      {/* Expanded detail panel */}
      {selected && LOC_AGE_MAP[selected] && (() => {
        const cell = LOC_AGE_MAP[selected];
        const rawData = dataKey==="ip" ? cell.ip : dataKey==="genre" ? cell.genre : cell.prod;
        const data = (dataKey==="prod" && isLicensor)
          ? rawData.map(d=>{ if(d.id==="other") return d; const meta=PROD_META.find(m=>m.id===d.id); return {...d,name:meta?meta.category:d.name}; })
          : rawData;
        const [loc, ag] = selected.split("|");
        return (
          <div style={{background:"white",border:"1px solid #6c63ff44",borderRadius:12,padding:"20px 24px",marginTop:16,boxShadow:"0 2px 12px rgba(108,99,255,0.1)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
              <span style={{fontSize:20}}>{FLAGS[loc]}</span>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:"#111827"}}>{loc} · {ag}</div>
                
              </div>
              <button onClick={()=>setSelected(null)} style={{marginLeft:"auto",background:"#f3f4f6",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#6b7280"}}>✕ Close</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {data.map((d,i)=>{
                const color = dataKey==="genre"
                  ? (d.g==="Other"?"#9ca3af":(GENRE_COLORS[d.g]||"#94a3b8"))
                  : (d.id==="other"?"#9ca3af":(CHAR_COLORS[d.id]||"#94a3b8"));
                const label = dataKey==="genre" ? d.g : d.name;
                const top1pct = data[0].pct;
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:11,color:"#9ca3af",width:18,textAlign:"right",flexShrink:0}}>{i+1}</span>
                    <div style={{width:14,height:14,borderRadius:"50%",background:dataKey==="genre"?(d.g==="Other"?"#f3f4f6":(GENRE_COLORS[d.g]||"#94a3b8")):(d.id==="other"?"#f3f4f6":(CHAR_COLORS[d.id]||"#94a3b8")),flexShrink:0}}/>
                    <span style={{fontSize:12,color:"#374151",width:160,flexShrink:0,fontWeight:i===0?700:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span>
                    <div style={{flex:1,background:"#f3f4f6",borderRadius:4,height:14,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:4,width:`${top1pct>0?(d.pct/top1pct)*100:0}%`,background:color}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color,width:45,textAlign:"right",flexShrink:0}}>{rPct(d.pct)}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"12px 18px",marginTop:16,display:"flex",gap:10,alignItems:"flex-start"}}>
        <span style={{fontSize:14,flexShrink:0}}>⚠️</span>
        <div style={{fontSize:11,color:"#92400e",lineHeight:1.6}}>
          Each cell represents a single participant unless noted. Philippines Under 25 has 2 participants (Jaelee + SDoh). Empty cells (—) indicate no participant data for that combination. Click any filled cell to expand the full ranking.
        </div>
      </div>
    </div>
  );
}

const LOC_GENRE_DATA = {
  Singapore:  {Kawaii:32.0,"Western Cartoons":28.9,"Science Fiction":16.2,Anime:13.6,Musician:3.7,Sports:2.8,Celebrities:1.6,Games:1.2,Horror:0.1},

  Thailand:   {Kawaii:54.3,"Western Cartoons":29.2,Musician:7.3,Anime:6.5,"Science Fiction":1.2,Games:0.7,Sports:0.6,Celebrities:0.2,Horror:0.2},
  Malaysia:   {Kawaii:34.5,Celebrities:18.5,"Western Cartoons":15.7,Musician:15.7,Anime:6.8,"Science Fiction":4.6,Sports:2.1,Games:1.1,Horror:1.1},
  Philippines:{Musician:33.9,Celebrities:17.0,"Science Fiction":12.2,Sports:9.1,Games:8.9,Horror:7.0,Kawaii:5.4,"Western Cartoons":3.5,Anime:2.9},
};
const GENRE_ORDER = ["Kawaii","Western Cartoons","Musician","Anime","Science Fiction","Celebrities","Sports","Games","Horror"];

function LocGenreHeatmap() {
  const [hoveredCell, setHoveredCell] = useState(null);
  const locs = ['Singapore','Indonesia','Thailand','Malaysia','Philippines'];

  // Find max value per genre for relative scaling
  const genreMax = {};
  GENRE_ORDER.forEach(g => {
    genreMax[g] = Math.max(...locs.map(l => LOC_GENRE_DATA[l][g]||0));
  });

  // Find rank of each genre per location
  const locRanks = {};
  locs.forEach(loc => {
    const sorted = [...GENRE_ORDER].sort((a,b)=>(LOC_GENRE_DATA[loc][b]||0)-(LOC_GENRE_DATA[loc][a]||0));
    locRanks[loc] = {};
    sorted.forEach((g,i) => { locRanks[loc][g] = i+1; });
  });

  const getIntensity = (val, max) => max > 0 ? val/max : 0;

  const hexToRgb = hex => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  };

  const cellBg = (genre, loc) => {
    const val = LOC_GENRE_DATA[loc][genre]||0;
    const intensity = getIntensity(val, genreMax[genre]);
    const color = GENRE_COLORS[genre]||"#6c63ff";
    const [r,g,b] = hexToRgb(color);
    const a = 0.08 + intensity * 0.72;
    return `rgba(${r},${g},${b},${a})`;
  };

  const cellText = (genre, loc) => {
    const val = LOC_GENRE_DATA[loc][genre]||0;
    const intensity = getIntensity(val, genreMax[genre]);
    return intensity > 0.5 ? "white" : "#374151";
  };

  return (
    <div style={{marginBottom:40}}>
      {/* Legend */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#9ca3af",fontWeight:600}}>Genres:</span>
        {GENRE_ORDER.map(g=>(
          <div key={g} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:GENRE_COLORS[g]}}/>
            <span style={{fontSize:10,color:"#374151"}}>{g}</span>
          </div>
        ))}
      </div>

      {/* Heatmap table */}
      <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        {/* Header: genres as columns */}
        <div style={{display:"grid",gridTemplateColumns:`130px repeat(${GENRE_ORDER.length},1fr)`,background:"#f8f9fb",borderBottom:"2px solid #e5e7eb"}}>
          <div style={{padding:"10px 12px",fontSize:10,fontWeight:700,color:"#9ca3af",borderRight:"1px solid #e5e7eb"}}>Location \ Genre</div>
          {GENRE_ORDER.map(g=>(
            <div key={g} style={{padding:"8px 4px",textAlign:"center",borderRight:"1px solid #e5e7eb"}}>

              <div style={{fontSize:9,fontWeight:700,color:"#374151",lineHeight:1.2}}>{g}</div>
            </div>
          ))}
        </div>

        {/* Data rows: locations */}
        {locs.map((loc,li)=>(
          <div key={loc} style={{display:"grid",gridTemplateColumns:`130px repeat(${GENRE_ORDER.length},1fr)`,borderBottom:li<locs.length-1?"1px solid #e5e7eb":"none"}}>
            {/* Location label */}
            <div style={{padding:"16px 12px",borderRight:"1px solid #e5e7eb",display:"flex",alignItems:"center",gap:6,background:"#fafafa"}}>
              <span style={{fontSize:18}}>{FLAGS[loc]}</span>
              <span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{loc}</span>
            </div>
            {/* Genre cells */}
            {GENRE_ORDER.map(g=>{
              const val = LOC_GENRE_DATA[loc][g]||0;
              const rank = locRanks[loc][g];
              const isHovered = hoveredCell===`${loc}|${g}`;
              const bg = cellBg(g,loc);
              const textColor = cellText(g,loc);
              return (
                <div key={g}
                  onMouseEnter={()=>setHoveredCell(`${loc}|${g}`)}
                  onMouseLeave={()=>setHoveredCell(null)}
                  style={{
                    padding:"12px 6px",
                    borderRight:"1px solid #e5e7eb",
                    background: isHovered ? GENRE_COLORS[g] : bg,
                    transition:"background 0.15s",
                    cursor:"default",
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,
                    position:"relative",
                  }}>
                  <div style={{fontSize:13,fontWeight:800,color:isHovered?"white":textColor,lineHeight:1}}>{val}%</div>
                  <div style={{
                    fontSize:8,fontWeight:700,
                    color:isHovered?"rgba(255,255,255,0.8)":(rank<=3?"white":"#9ca3af"),
                    background:isHovered?"rgba(255,255,255,0.25)":(rank===1?GENRE_COLORS[g]:rank===2?"#94a3b8":rank===3?"#cbd5e1":"transparent"),
                    borderRadius:8,padding:"1px 5px",
                  }}>#{rank}</div>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Country summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginTop:20}}>
        {locs.map(loc=>{
          const sorted = GENRE_ORDER.map(g=>({g,pct:LOC_GENRE_DATA[loc][g]||0})).sort((a,b)=>b.pct-a.pct);
          const top1 = sorted[0];
          const color = GENRE_COLORS[top1.g]||"#6c63ff";
          return (
            <div key={loc} style={{background:"white",border:`1px solid ${color}33`,borderRadius:12,padding:"14px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                <span style={{fontSize:18}}>{FLAGS[loc]}</span>
                <span style={{fontSize:12,fontWeight:700,color:"#111827"}}>{loc}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {sorted.slice(0,3).map((d,i)=>(
                  <div key={d.g} style={{display:"flex",alignItems:"center",gap:5}}>

                    <span style={{fontSize:10,color:"#374151",flex:1,fontWeight:i===0?700:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.g}</span>
                    <div style={{width:40,height:6,background:"#f3f4f6",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${(d.pct/sorted[0].pct)*100}%`,background:GENRE_COLORS[d.g],borderRadius:3}}/>
                    </div>
                    <span style={{fontSize:10,fontWeight:700,color:GENRE_COLORS[d.g],width:32,textAlign:"right",flexShrink:0}}>{rPct(d.pct)}%</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"12px 18px",marginTop:16,display:"flex",gap:10,alignItems:"flex-start"}}>
        <span style={{fontSize:14,flexShrink:0}}>💡</span>
        <div style={{fontSize:11,color:"#92400e",lineHeight:1.6}}>
          Cell colour intensity shows how strongly each genre ranks within that country — darker = higher share. The rank badge (#1, #2…) shows the genre's position in that country's preference order. Hover any cell to highlight.
        </div>
      </div>
    </div>
  );
}

  const isLicensor = view === "licensor";
  const locs = ['Singapore','Indonesia','Thailand','Malaysia','Philippines'];

  const MiniBar = ({items, colorFn, labelFn, iconFn}) => (

              <div style={{height:"100%",width:`${items[0].pct>0?(d.pct/items[0].pct)*100:0}%`,background:color,borderRadius:3}}/>
            </div>
            <span style={{fontSize:9.5,fontWeight:700,color,width:32,textAlign:"right",flexShrink:0}}>{rPct(d.pct)}%</span>
          </div>
        );
      })}
    </div>
  );

  const renderCellContent = (cell) => {
    const rawData = dataKey==="ip" ? cell.ip : dataKey==="genre" ? cell.genre : cell.prod;
    const data = (dataKey==="prod" && isLicensor)
      ? rawData.map(d=>{ if(d.id==="other") return d; const meta=PROD_META.find(m=>m.id===d.id); return {...d,name:meta?meta.category:d.name}; })
      : rawData;
    if (dataKey==="genre") {
      return <MiniBar items={data}
        colorFn={d=>d.g==="Other"?"#9ca3af":(GENRE_COLORS[d.g]||"#94a3b8")}
        labelFn={d=>d.g}
        iconFn={d=><div style={{width:10,height:10,borderRadius:"50%",background:d.g==="Other"?"#f3f4f6":(GENRE_COLORS[d.g]||"#94a3b8"),flexShrink:0}}/>}
      />;

    const colorFn = d=>d.id==="other"?"#9ca3af":(CHAR_COLORS[d.id]||"#94a3b8");

    <div style={{marginBottom:40}}>

        const rawData=dataKey==="ip"?cell.ip:dataKey==="genre"?cell.genre:cell.prod;
        const data=(dataKey==="prod"&&isLicensor)
          ?rawData.map(d=>{if(d.id==="other")return d;const meta=PROD_META.find(m=>m.id===d.id);return{...d,name:meta?meta.category:d.name};})
          :rawData;
        const [loc,gender]=selected.split("|");
        const gc=GENDER_COLOR[gender];
        return (
          <div style={{background:"white",border:`1px solid ${gc}44`,borderRadius:12,padding:"20px 24px",marginTop:16,boxShadow:`0 2px 12px ${gc}18`}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
              <span style={{fontSize:20}}>{FLAGS[loc]}</span>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:"#111827"}}>{loc} · {gender==="Female"?"♀":"♂"} {gender}</div>
                
              </div>
              <button onClick={()=>setSelected(null)} style={{marginLeft:"auto",background:"#f3f4f6",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#6b7280"}}>✕ Close</button>

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {data.map((d,i)=>{
                const color=dataKey==="genre"
                  ?(d.g==="Other"?"#9ca3af":(GENRE_COLORS[d.g]||"#94a3b8"))
                  :(d.id==="other"?"#9ca3af":(CHAR_COLORS[d.id]||"#94a3b8"));
                const label=dataKey==="genre"?d.g:d.name;
                const top1pct=data[0].pct;
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:11,color:"#9ca3af",width:18,textAlign:"right",flexShrink:0}}>{i+1}</span>
                    <div style={{width:14,height:14,borderRadius:"50%",background:dataKey==="genre"?(d.g==="Other"?"#f3f4f6":(GENRE_COLORS[d.g]||"#94a3b8")):(d.id==="other"?"#f3f4f6":(CHAR_COLORS[d.id]||"#94a3b8")),flexShrink:0}}/>
                    <span style={{fontSize:12,color:"#374151",width:160,flexShrink:0,fontWeight:i===0?700:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span>
                    <div style={{flex:1,background:"#f3f4f6",borderRadius:4,height:14,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:4,width:`${top1pct>0?(d.pct/top1pct)*100:0}%`,background:color}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color,width:45,textAlign:"right",flexShrink:0}}>{rPct(d.pct)}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"12px 18px",marginTop:16,display:"flex",gap:10,alignItems:"flex-start"}}>
        <span style={{fontSize:14,flexShrink:0}}>⚠️</span>
        <div style={{fontSize:11,color:"#92400e",lineHeight:1.6}}>
          Empty cells (—) indicate no participant data for that combination. Click any filled cell to expand the full ranking.
        </div>
      </div>
    </div>
  );
}

// ─── GENERIC H2H COMPONENT ────────────────────────────────────────────────────
function H2HGrid({namesList, winMatrix, winRate, nameToId, itemLabel, defaultSelected, btData, subtitleFn}) {
  const [selected, setSelected] = useState(defaultSelected);
  const wins = winMatrix[selected]||{};
  const others = namesList.filter(n=>n!==selected);

  // BT pairwise probability: P(A beats B) = scoreA / (scoreA + scoreB)
  const getBT = name => {
    const entry = btData.find(d=>d.name===name||d.guide===name);
    return entry ? entry.pct : 1;
  };

  const h2h = others.map(opp=>{
    const w=wins[opp]||0, l=(winMatrix[opp]?.[selected])||0;
    const sA=getBT(selected), sB=getBT(opp);
    const btProb = Math.round(sA/(sA+sB)*100);
    return {opp,w,l,rate:btProb};
  }).sort((a,b)=>b.rate-a.rate);

  const selId = nameToId[selected]||"char_0";
  const selColor = CHAR_COLORS[selId]||"#6c63ff";
  const btRank = btData.findIndex(d=>d.name===selected||d.guide===selected)+1;

  return (
    <div>
      {/* Selector */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
        {namesList.map(name=>{
          const cid=nameToId[name]||"char_0";
          const active=selected===name;
          const color=CHAR_COLORS[cid]||"#94a3b8";
          return (
            <button key={name} onClick={()=>setSelected(name)} style={{
              display:"inline-flex",alignItems:"center",gap:6,
              padding:"6px 12px",borderRadius:20,cursor:"pointer",
              background:active?color:"transparent",
              border:`1.5px solid ${active?color:"#e5e7eb"}`,
              color:active?"white":"#6b7280",
              fontSize:11,fontWeight:600,transition:"all 0.15s",
            }}>
              {name}
            </button>
          );
        })}
      </div>

      {/* H2H grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {h2h.map(({opp,w,l,rate})=>{
          const oppId=nameToId[opp]||"char_0";
          const oppColor=CHAR_COLORS[oppId]||"#94a3b8";
          const win=rate>=50;
          return (
            <div key={opp} style={{background:"white",border:`1px solid ${win?selColor+"44":"#e5e7eb"}`,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:oppColor,flexShrink:0}}/>
                <div style={{fontSize:10,color:"#6b7280",fontWeight:600,lineHeight:1.3,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opp}</div>
              </div>
              <div style={{fontSize:28,fontWeight:800,color:win?selColor:"#ef4444",lineHeight:1,marginBottom:2}}>{rate}<span style={{fontSize:12}}>%</span></div>
              <div style={{fontSize:9,color:"#9ca3af",marginBottom:8}}>BT Win Probability</div>
              <div style={{height:4,background:"#f3f4f6",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${rate}%`,background:win?selColor:"#ef4444",borderRadius:2}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FranchiseSegmentChart({data,title}){
  if(!data||data.length===0)return(<div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}><div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:8}}>{title}</div><div style={{fontSize:11,color:"#9ca3af",textAlign:"center",padding:"20px 0"}}>No data for this tier</div></div>);
  const pieData=data.map(d=>({name:d.franchise,value:d.pct,color:d.franchise==="Other"?"#f3f4f6":(FRANCHISE_COLORS[d.franchise]||"#94a3b8")}));
  return(<div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
    <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:2}}>{title}</div>
    <ResponsiveContainer width="100%" height={140}><PieChart><Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={58} innerRadius={26} paddingAngle={2}>{pieData.map((e,i)=><Cell key={i} fill={e.color} stroke={e.name==="Other"?"#d1d5db":"white"} strokeWidth={2}/>)}</Pie><Tooltip content={<PieTooltip/>}/></PieChart></ResponsiveContainer>
    <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:8}}>
      {data.map((d,i)=>{const color=d.franchise==="Other"?"#9ca3af":(FRANCHISE_COLORS[d.franchise]||"#94a3b8");return(<div key={i} style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}/><span style={{fontSize:10,color:d.franchise==="Other"?"#9ca3af":"#374151",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.franchise}</span><span style={{fontSize:10,fontWeight:600,color,flexShrink:0}}>{rPct(d.pct)}%</span></div>);})}
    </div>
  </div>);
}

function FranchiseCrossTab({cells,rowKeys,colKeys,rowLabel,colLabel,rowFn,colFn,cellKey}){
  const [sel,setSel]=useState(null);
  const map={};cells.forEach(c=>{map[cellKey(c)]=c;});
  const expandCell=sel?map[sel]:null;
  // Derive row/col label from selected key for display
  const getRowVal = cell => rowLabel==="Location"?cell.loc:cell.ag;
  const getColVal = cell => colFn?cell[colFn]:(cell.ag||cell.gender);
  return(<div style={{marginBottom:40}}>
    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>

        <div style={{padding:"10px 12px",fontSize:10,fontWeight:700,color:"#9ca3af",borderRight:"1px solid #e5e7eb"}}>{rowLabel} \ {colLabel}</div>
        {colKeys.map(c=><div key={c} style={{padding:"10px 12px",fontSize:11,fontWeight:700,color:GENDER_COLOR[c]||"#374151",textAlign:"center",borderRight:"1px solid #e5e7eb"}}>{c==="Female"?"♀ Female":c==="Male"?"♂ Male":c}</div>)}
      </div>
      {rowKeys.map((row,ri)=>(
        <div key={row} style={{display:"grid",gridTemplateColumns:`${rowLabel==="Location"?"130px":"120px"} repeat(${colKeys.length},1fr)`,borderBottom:ri<rowKeys.length-1?"1px solid #e5e7eb":"none"}}>
          <div style={{padding:"14px 12px",borderRight:"1px solid #e5e7eb",display:"flex",alignItems:"center",gap:6,background:"#fafafa"}}>
            {rowLabel==="Location"&&<span style={{fontSize:16}}>{FLAGS[row]}</span>}
            <span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{row}</span>
          </div>
          {colKeys.map(col=>{const k=rowFn(row,col);const cell=map[k];const isSel=sel===k;const gc=colFn?GENDER_COLOR[col]:null;return(
            <div key={col} onClick={()=>cell&&setSel(isSel?null:k)} style={{padding:"12px 10px",borderRight:"1px solid #e5e7eb",background:cell?(isSel?(gc?`${gc}12`:"#f5f3ff"):"white"):"#f9fafb",cursor:cell?"pointer":"default"}}>
              {cell?<FranchiseMiniBar items={cell.franchise}/>:<div style={{height:60,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,color:"#d1d5db"}}>—</span></div>}
            </div>
          );})}
        </div>
      ))}
    </div>
    {expandCell&&(()=>{const gc=colFn?GENDER_COLOR[expandCell[colFn]]:null;const accent=gc||"#6c63ff";return(
      <div style={{background:"white",border:`1px solid ${accent}44`,borderRadius:12,padding:"20px 24px",marginTop:16,boxShadow:`0 2px 12px ${accent}18`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          {rowLabel==="Location"&&<span style={{fontSize:20}}>{FLAGS[expandCell.loc]}</span>}
          <div style={{fontSize:15,fontWeight:800,color:"#111827"}}>{getRowVal(expandCell)} · {getColVal(expandCell)}</div>
          <button onClick={()=>setSel(null)} style={{marginLeft:"auto",background:"#f3f4f6",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#6b7280"}}>✕ Close</button>
        </div>
        {expandCell.franchise.map((d,i)=>{const color=d.franchise==="Other"?"#9ca3af":(FRANCHISE_COLORS[d.franchise]||"#94a3b8");return(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span style={{fontSize:11,color:"#9ca3af",width:18,textAlign:"right"}}>{i+1}</span>

function FranchiseH2H(){
  const [sel,setSel]=useState("Pokemon");
  const wins=FRANCHISE_WIN_MATRIX[sel]||{};
  const others=FRANCHISE_LIST.filter(f=>f!==sel);
  const getBT=f=>FRANCHISE_TIER_DATA.top100.overall.find(d=>d.franchise===f)?.pct||1;
  const h2h=others.map(opp=>{const sA=getBT(sel),sB=getBT(opp);return{opp,rate:Math.round(sA/(sA+sB)*100)};}).sort((a,b)=>b.rate-a.rate);
  const sc=FRANCHISE_COLORS[sel]||"#6c63ff";
  return(<div>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
      {FRANCHISE_LIST.map(f=>{const active=sel===f;const c=FRANCHISE_COLORS[f]||"#94a3b8";return(<button key={f} onClick={()=>setSel(f)} style={{padding:"6px 12px",borderRadius:20,cursor:"pointer",background:active?c:"transparent",border:`1.5px solid ${active?c:"#e5e7eb"}`,color:active?"white":"#6b7280",fontSize:11,fontWeight:600,transition:"all 0.15s"}}>{f}</button>);})}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {h2h.map(({opp,rate})=>{const oc=FRANCHISE_COLORS[opp]||"#94a3b8";const win=rate>=50;return(
        <div key={opp} style={{background:"white",border:`1px solid ${win?sc+"44":"#e5e7eb"}`,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:10,height:10,borderRadius:"50%",background:oc,flexShrink:0}}/><div style={{fontSize:10,color:"#6b7280",fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opp}</div></div>
          <div style={{fontSize:28,fontWeight:800,color:win?sc:"#ef4444",lineHeight:1,marginBottom:2}}>{rate}<span style={{fontSize:12}}>%</span></div>
          <div style={{fontSize:9,color:"#9ca3af",marginBottom:8}}>BT Win Probability</div>
          <div style={{height:4,background:"#f3f4f6",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${rate}%`,background:win?sc:"#ef4444",borderRadius:2}}/></div>
        </div>
      );})}
    </div>
  </div>);
}

    <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>

            {rowLabel==="Location"&&<span style={{fontSize:16}}>{FLAGS[row]}</span>}
            <span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{row}</span>
          </div>
          {colKeys.map(col=>{const k=rowFn(row,col);const cell=map[k];const isSel=sel===k;const gc=colFn?GENDER_COLOR[col]:null;return(

      ))}

    {expandCell&&(()=>{const gc=colFn?GENDER_COLOR[expandCell[colFn]]:null;const accent=gc||"#6c63ff";return(

function LicensorH2H(){
  const [sel,setSel]=useState("Pokemon Company");
  const wins=LICENSOR_WIN_MATRIX[sel]||{};
  const others=LICENSOR_LIST.filter(f=>f!==sel);
  const getBT=f=>LICENSOR_TIER_DATA.top100.overall.find(d=>d.licensor===f)?.pct||1;
  const h2h=others.map(opp=>{const sA=getBT(sel),sB=getBT(opp);return{opp,rate:Math.round(sA/(sA+sB)*100)};}).sort((a,b)=>b.rate-a.rate);
  const sc=LICENSOR_COLORS[sel]||"#6c63ff";
  return(<div>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
      {LICENSOR_LIST.map(f=>{const active=sel===f;const c=LICENSOR_COLORS[f]||"#94a3b8";return(<button key={f} onClick={()=>setSel(f)} style={{padding:"6px 12px",borderRadius:20,cursor:"pointer",background:active?c:"transparent",border:`1.5px solid ${active?c:"#e5e7eb"}`,color:active?"white":"#6b7280",fontSize:11,fontWeight:600,transition:"all 0.15s"}}>{f}</button>);})}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {h2h.map(({opp,rate})=>{const oc=LICENSOR_COLORS[opp]||"#94a3b8";const win=rate>=50;return(
        <div key={opp} style={{background:"white",border:`1px solid ${win?sc+"44":"#e5e7eb"}`,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:10,height:10,borderRadius:"50%",background:oc,flexShrink:0}}/><div style={{fontSize:10,color:"#6b7280",fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opp}</div></div>
          <div style={{fontSize:28,fontWeight:800,color:win?sc:"#ef4444",lineHeight:1,marginBottom:2}}>{rate}<span style={{fontSize:12}}>%</span></div>
          <div style={{fontSize:9,color:"#9ca3af",marginBottom:8}}>BT Win Probability</div>
          <div style={{height:4,background:"#f3f4f6",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${rate}%`,background:win?sc:"#ef4444",borderRadius:2}}/></div>
        </div>
      );})}
    </div>
  </div>);
}

      </div>
      )}

      {/* HEADER */}
      <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"20px 32px"}}>
        <div style={{maxWidth:1050,margin:"0 auto"}}>
          {view === "licensee" && (
          <div style={{marginBottom:16}}>
            <h1 style={{margin:"0 0 4px",fontSize:26,fontWeight:700,color:"#111827"}}>Campaign Dashboard</h1>
          </div>
          )}
          {/* Only show campaign tabs when in consumer_preferences (or licensee view) */}
          {(view === "licensee" || licensorSection === "consumer_preferences") && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {MAIN_TABS
              .filter(t => !(view === "licensee" && (t.id === "consumers" || t.id === "styles"))
                        && !(view === "licensor" && (t.id === "genres" || t.id === "consumers" || t.id === "licensor")))
              .map(t=>(
              <button key={t.id} onClick={()=>{setMainTab(t.id);setSubTab("overall");}} style={{padding:"10px 18px",borderRadius:"8px 8px 0 0",background:mainTab===t.id?"linear-gradient(90deg,#6c63ff,#818cf8)":"transparent",border:mainTab===t.id?"none":"1px solid #e5e7eb",borderBottom:mainTab===t.id?"none":"1px solid #e5e7eb",color:mainTab===t.id?"white":"#6b7280",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Segoe UI',sans-serif",transition:"all 0.15s"}}>
                {t.id==="products" && view==="licensor" ? "Categories" : t.label}
              </button>
            ))}
          </div>
          )}
        </div>
      </div>

      {/* BODY */}
      <div style={{maxWidth:1050,margin:"0 auto",padding:"28px 24px 60px"}}>
        {/* Brand Awareness section for Licensor */}
        {view === "licensor" && licensorSection === "brand_awareness" && (
          <>
            <SectionHeader number="1" title="Consumer Awareness Profiles"/>
            {/* Sub-filter tabs */}
            <div style={{display:"flex",gap:8,marginBottom:24,flexWrap:"wrap"}}>
              {[
                {id:"overall",  label:"Overall"},
                {id:"location", label:"By Location"},
                {id:"age",      label:"By Age"},
                {id:"gender",   label:"By Gender"},
              ].map(t=><SubTab key={t.id} label={t.label} active={awareFilter===t.id} onClick={()=>setAwareFilter(t.id)}/>)}
            </div>
            <ConsumersOverall filter={awareFilter}/>
          </>
        )}

        {/* Campaign Dashboard — for Licensee always, for Licensor only under Consumer Preferences */}
        {(view === "licensee" || licensorSection === "consumer_preferences") && (<>
        {subTabs.length > 1 && (
          <div style={{display:"flex",gap:8,marginBottom:28,flexWrap:"wrap"}}>
            {subTabs.map(t=><SubTab key={t.id} label={t.label} active={subTab===t.id} onClick={()=>setSubTab(t.id)}/>)}
          </div>
        )}
        <SectionHeader number={sectionNum} title={
          mainTab==="products" && view==="licensor"
            ? sectionTitle.replace(/Products?/g, "Categories").replace(/Product/g, "Category")
            : sectionTitle
        }/>

        {mainTab==="characters" && subTab==="overall"  && <CharOverall tier={tier}/>}
        {mainTab==="characters" && subTab==="location" && <CharByLocation tier={tier}/>}
        {mainTab==="characters" && subTab==="age"      && <CharByAge tier={tier}/>}
        {mainTab==="characters" && subTab==="gender"   && <CharByGender tier={tier}/>}
        {mainTab==="characters" && subTab==="loc_age"    && <LocAgeGrid dataKey="ip"/>}
        {mainTab==="characters" && subTab==="loc_gender"  && <LocGenderGrid dataKey="ip"/>}
        {mainTab==="characters" && subTab==="age_gender"  && <AgeGenderGrid dataKey="ip"/>}
        {mainTab==="characters" && subTab==="h2h"      && <CharH2H/>}
        {mainTab==="genres"     && subTab==="overall"  && <GenreOverall tier={tier} view={view}/>}
        {mainTab==="genres"     && subTab==="location" && <GenreByLocation tier={tier}/>}
        {mainTab==="genres"     && subTab==="age"      && <GenreByAge tier={tier}/>}
        {mainTab==="genres"     && subTab==="gender"   && <GenreByGender tier={tier}/>}
        {mainTab==="genres"     && subTab==="loc_age"    && <LocAgeGrid dataKey="genre"/>}
        {mainTab==="genres"     && subTab==="loc_gender"  && <LocGenderGrid dataKey="genre"/>}
        {mainTab==="genres"     && subTab==="age_gender"  && <AgeGenderGrid dataKey="genre"/>}
        {mainTab==="genres"     && subTab==="h2h"        && <GenreH2H/>}
        {mainTab==="products"   && subTab==="overall"   && <ProductOverall tier={tier} view={view}/>}
        {mainTab==="products"   && subTab==="location"  && <ProductByLocation tier={tier} view={view}/>}
        {mainTab==="products"   && subTab==="age"       && <ProductByAge tier={tier} view={view}/>}
        {mainTab==="products"   && subTab==="gender"    && <ProductByGender tier={tier} view={view}/>}
        {mainTab==="products"   && subTab==="loc_age"    && <LocAgeGrid dataKey="prod" view={view}/>}
        {mainTab==="products"   && subTab==="loc_gender"  && <LocGenderGrid dataKey="prod" view={view}/>}
        {mainTab==="products"   && subTab==="age_gender"  && <AgeGenderGrid dataKey="prod"/>}
        {mainTab==="products"   && subTab==="h2h"         && <H2HGrid
            namesList={PROD_NAMES_LIST}
            winMatrix={PROD_WIN_MATRIX}
            winRate={PROD_WIN_RATE}
            nameToId={PROD_NAME_TO_ID}
            itemLabel="Product"
            defaultSelected="Plush Keychain"
            btData={getProductData("top100").map(d=>({...d,name:d.product}))}
            subtitleFn={name=>{const d=getProductData("top100").find(p=>p.product===name);return d?`${d.category} · BT: ${rPct(d.pct)}%`:"";}}
          />}
        {mainTab==="franchise"  && subTab==="overall"    && <FranchiseOverall tier={tier}/>}
        {mainTab==="franchise"  && subTab==="location"   && <FranchiseByLocation tier={tier}/>}
        {mainTab==="franchise"  && subTab==="age"        && <FranchiseByAge tier={tier}/>}
        {mainTab==="franchise"  && subTab==="gender"     && <FranchiseByGender tier={tier}/>}
        {mainTab==="franchise"  && subTab==="loc_age"    && <FranchiseLocAge/>}
        {mainTab==="franchise"  && subTab==="loc_gender" && <FranchiseLocGender/>}
        {mainTab==="franchise"  && subTab==="age_gender" && <FranchiseAgeGender/>}
        {mainTab==="franchise"  && subTab==="h2h"        && <FranchiseH2H/>}
        {mainTab==="licensor"   && subTab==="overall"    && <LicensorOverall tier={tier}/>}
        {mainTab==="licensor"   && subTab==="location"   && <LicensorByLocation tier={tier}/>}
        {mainTab==="licensor"   && subTab==="age"        && <LicensorByAge tier={tier}/>}
        {mainTab==="licensor"   && subTab==="gender"     && <LicensorByGender tier={tier}/>}
        {mainTab==="licensor"   && subTab==="loc_age"    && <LicensorLocAge/>}
        {mainTab==="licensor"   && subTab==="loc_gender" && <LicensorLocGender/>}
        {mainTab==="licensor"   && subTab==="age_gender" && <LicensorAgeGender/>}
        {mainTab==="licensor"   && subTab==="h2h"        && <LicensorH2H/>}
        {mainTab==="styles"     && subTab==="overall"   && <StyleGuideOverall tier={tier} view={view}/>}
        {mainTab==="styles"     && subTab==="h2h"       && <H2HGrid
            namesList={ASSET_NAMES_LIST}
            winMatrix={ASSET_WIN_MATRIX}
            winRate={ASSET_WIN_RATE}
            nameToId={ASSET_NAME_TO_ID}
            itemLabel="Asset"
            defaultSelected="Asset #6"
            btData={getStyleData("top100").map(d=>({...d,name:d.guide}))}
            subtitleFn={name=>view==="licensor" ? `Win rate: ${Math.round(ASSET_WIN_RATE[name])}%` : `${ASSET_TO_CHAR_NAME[name]||""} · Win rate: ${Math.round(ASSET_WIN_RATE[name])}%`}
          />}
        {mainTab==="consumers"  && subTab==="overall"  && view==="licensee" && <ConsumersOverall/>}

        {/* Methodology */}
        <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"20px 24px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style={{width:16,height:16,borderRadius:3,background:"#6c63ff",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"white",fontSize:10}}>✓</span></div>
            <span style={{fontWeight:700,fontSize:13,color:"#6c63ff"}}>Methodology Note</span>
          </div>
          <p style={{margin:0,fontSize:12,color:"#374151",lineHeight:1.7}}>Rankings are derived using the <strong>Bradley–Terry pairwise comparison model</strong>, fitted via the MM (Minorization-Maximization) algorithm. Each score represents the estimated probability of winning any head-to-head matchup, normalised to sum to 100%.</p>

        </div>
        </>)}
      </div>
    </div>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
  </script>
</body>
</html>
